spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    clean-disabled: true

logging:
  level:
    co.udea.codefactory.creditscoring: INFO
    org.springframework: WARN
    org.hibernate: WARN

management:
  endpoint:
    health:
      show-details: when-authorized
