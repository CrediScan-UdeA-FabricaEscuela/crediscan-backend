server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: credit-scoring-engine
  profiles:
    active: dev

  # JPA defaults (overridden per profile)
  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  # Flyway defaults
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # RFC 7807 Problem Details
  mvc:
    problemdetails:
      enabled: true

# Springdoc / OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
  group-configs:
    - group: v1
      paths-to-match: /api/v1/**

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
