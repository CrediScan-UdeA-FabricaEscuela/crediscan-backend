server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: credit-scoring-engine
  profiles:
    active: dev

  # JPA defaults (overridden per profile)
  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  # Flyway defaults
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # RFC 7807 Problem Details
  mvc:
    problemdetails:
      enabled: true

  # Page serialization: nested "page" object format (Spring Data 3.3+)
  data:
    web:
      pageable:
        serialization-mode: via-dto

# Springdoc / OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
  group-configs:
    - group: v1
      paths-to-match: /api/v1/**

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200,http://localhost:5173}

app:
  evaluation:
    cooldown-hours: ${APP_EVALUATION_COOLDOWN_HOURS:24}
  security:
    jwt:
      secret: ${APP_JWT_SECRET}
      expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}
    crypto:
      encryption-key-base64: ${APP_CRYPTO_ENCRYPTION_KEY_BASE64}
      hash-key-base64: ${APP_CRYPTO_HASH_KEY_BASE64}
