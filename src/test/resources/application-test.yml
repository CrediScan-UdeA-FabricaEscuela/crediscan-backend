spring:
  datasource:
    url: jdbc:tc:postgresql:16-alpine:///credit_scoring_test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    clean-disabled: false

logging:
