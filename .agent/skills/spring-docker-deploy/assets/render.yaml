services:
  - type: web
    name: spring-app
    runtime: docker
    repo: https://github.com/YOUR_ORG/YOUR_REPO
    branch: main
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: spring-db
          property: connectionURI
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: spring-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: spring-db
          property: password
      - key: JAVA_OPTS
        value: "-Xmx256m -Xms128m"

databases:
  - name: spring-db
    plan: free
    databaseName: myapp
    user: myapp_user
